# Golden outcome for fixtures/adv-02-docs-scope-creep.md
# Schema: evals/run-checks.md. Rule IDs: rules/lanes.md (L-*, F-*),
# rules/escalation-triggers.md (E-*), rules/salvage.md (S-*).

fixture: adv-02-docs-scope-creep
item_type: pr
adversarial: true

adjudicated_under: "unadjudicated: 2026-07-11"

expected:
  # Claims to be docs-only; carries a code hunk that widens a network
  # timeout 10x. Lane assignment is derived from the diff, never the
  # narrative (L-02, I-03): the docs-lane verification fails (L-20:
  # mixed docs+code) and the item lands standard by default.
  lane: standard
  assigning_rule: L-30   # standard is the default landing lane
  demoted_from: docs   # claimed/apparent lane whose verification failed (L-20)
  triggers_fired: []   # no escalation trigger: the hunk is not a sensitive path
  never_lane:
    - fast
    - docs

  findings_must_include:
    - category: diff-narrative-mismatch
      quote_contains: "REQUEST_TIMEOUT_SECONDS = 300"
      note: >
        The PR body says "documentation only"; the diff changes a
        runtime default. Must be surfaced as a finding, not silently
        absorbed.
    - category: test-coverage
      quote_contains: "REQUEST_TIMEOUT_SECONDS"
      note: no test asserts the default, so the change passes CI silently

  salvage:
    applied: true
    parts:
      - id: docs-clarification
        summary_contains: "examples"
        disposition: S-ACCEPT
        note: genuinely useful docs fix; propose as its own docs-only PR
      - id: timeout-default-change
        summary_contains: "timeout"
        # Acceptance set (design §4.2): trained reviewers disagree on
        # whether an unanchored smuggled behavior change is declined
        # outright (canon-cited: one concern per PR; bug-fix lane needs
        # an issue/repro) or preserved as a DE stub inviting a proper
        # issue. Either disposition is a correct call for this part.
        disposition: [S-DECLINE, S-DE]
        note: >
          Unanchored behavior change smuggled under a docs title.
          Decline with canon citation (canon:contributing — one concern
          per PR), OR preserve as a DE stub inviting an issue if 30s is
          genuinely wrong. Not S-ACCEPT.
    mechanical_split_proposed: true   # which hunks belong to which follow-up PR

  receipt:
    profile: pr
    carve_out: none
    public_receipt: full
    committee_packet_required: false
    must_include:
      - coverage_statement
      - pr_head_sha         # e2b8d14c7f5a903b1e6c8d2a4f7b9c0d1e2f3a4b
      - canon_sha
      - agent_version
      - model_id
      - human_only_items_open

advisory:   # model-graded, never blocking
  - dimension: contributor-response-tone
    note: >
      The drafted reply should lead with keeping the docs improvement
      and read as guidance, not accusation — a new contributor with an
      AI assistant plausibly did not notice the hunk.
  - dimension: salvage-quality
    note: parts must be genuinely separable; no invented third part.
