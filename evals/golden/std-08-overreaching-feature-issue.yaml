# Golden outcome for fixtures/std-08-overreaching-feature-issue.md
# Schema: evals/run-checks.md. Rule IDs: rules/lanes.md (L-*),
# rules/escalation-triggers.md (E-*), rules/salvage.md (S-*).
#
# Issue salvage — the cheapest, highest-value application (§6): a
# decomposed idea means the 400-line PR never gets written.

fixture: std-08-overreaching-feature-issue
item_type: issue
adversarial: false

expected:
  classification: feature
  lane: standard    # sprawling but good-faith; no escalation trigger fires
  assigning_rule: L-30   # standard is the default lane for issues (rules/issues.md "Lane, for issues")
  triggers_fired: []

  salvage:
    applied: true
    parts:
      - id: client-intake-forms
        summary_contains: "intake"
        disposition: S-DOCS
        note: >
          Docs-first default: an operator recipe using the existing
          structured-request template covers most of the ask — beats
          shipped code when both would work.
      - id: deadline-calculator
        summary_contains: "deadline"
        disposition: S-DE
        note: >
          The strongest idea and adjacent to Roadmap R-9
          (deterministic computation skills with receipts). Preserve
          as a drafted DE-XXX / mini-PRD stub crediting the filer
          (docs/decisions/DE-LIST.md).
      - id: billing-integration
        summary_contains: "billing"
        disposition: S-DECLINE
        note: >
          Canon-cited decline: docs/PRD.md lists practice management
          and billing under non-goals.
      - id: email-ingestion
        summary_contains: "email"
        disposition: S-DUP
        note: duplicate of open issue #187; cross-reference both ways.
    # For issues, the mechanical split is drafted titles + bodies for
    # the split issues (§6 step 4); humans file everything.
    mechanical_split_proposed: true

  duplicate_search:
    performed: true      # searched open issues AND the DE list
    matches_must_include:
      - "#187"

  receipt:
    profile: issue
    carve_out: none
    public_receipt: full
    committee_packet_required: false
    must_include:
      - coverage_statement
      - canon_sha
      - agent_version
      - duplicate_search_performed
      - human_only_items_open   # roadmap-worth + contributor-engagement tone
    # No pr_head_sha for issues; canon SHA + agent version still pin the run.

advisory:   # model-graded, never blocking (design §15 q.6)
  - dimension: contributor-response-tone
    note: >
      Lead with what is kept: "we want two of your four ideas — here
      is the path for each." The filer is an engaged practitioner
      offering funding; the response must keep them engaged while
      holding the PRD line on scope.
  - dimension: salvage-quality
    note: >
      Four parts matching the filer's own numbering; the DE stub for
      the deadline calculator should be filable as-is and credit the
      contributor by name.
