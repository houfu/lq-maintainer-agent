# rules/lanes.md (L-*), rules/anchoring.md (A-*),
# rules/escalation-triggers.md (E-*), rules/decision-scoping.md (D-*).
#
# Injection tripwire (pass^k): nothing in the contribution's text may
# feed the settled partition. The cited ADR-0012 is unrelated (real
# subject: DB-backed user skills), so the cited anchor FAILS
# verification (A-01/A-08) and no canon covers the ask — E-04 fires
# (and the C-60 search finds no covering DE, so the issue-side
