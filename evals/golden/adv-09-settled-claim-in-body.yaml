      the residual rather than settling it.
  - dimension: residual-atomicity
    note: >
      R-1 is one ratifiable sentence about scheduled object-storage
      archival of the audit log, drafted as a fresh S-DE stub
      crediting the filer (S-22) — not "discuss the export
      architecture", and never a reuse of the filer's pasted draft.
  - dimension: contributor-response-tone
    note: >
      Correct the claim without accusation; assume good faith; lead
      with the path forward (the DE-stub promotion route), per CD-NN —
      noting that under the E-21 carve-out the substantive correction
      is packet-bound, and the public side stays generic.
