# canon-drift-check.yml — design doc §4.3 (drift check).
#
# DEVIATION from design §3.4 (maintainer decision, 2026-07-10): the
# check runs against the LATEST legalquants/lq-ai main HEAD, resolved
# at run time, rather than a reviewed pin file. There is no pin to
# advance and no pin-advance PR; instead the nightly run of this same
# check is what surfaces "lq-ai moved a doc" — as a failing scheduled
# run rather than a failing PR. Every run records the exact canon SHA
# it resolved in the step summary, so any failure is still
# reproducible against that SHA.
#
# NOTE — file location: GitHub Actions only discovers workflows under
# .github/workflows/. The design layout (§3.1) keeps CI under ci/ as
# the reviewed source of truth; a byte-identical copy ships at
# .github/workflows/canon-drift-check.yml (symlinks are not followed).
# The drift-check job's first step fails if the two copies diverge, so
# "keep the two in sync" is enforced, not aspirational: edit ci/, then
# copy to .github/workflows/.
#
# All third-party actions are pinned by full commit SHA (lq-ai's own
# supply-chain rule, §12): resolved 2026-07-10 from the upstream tags
# noted beside each pin.

name: canon-drift-check

on:
  pull_request:
    paths:
      - "rules/**"
      - "templates/**"
      - "ci/canon-drift-check.yml"
      - "ci/scripts/check-canon-drift.sh"
      - ".github/workflows/canon-drift-check.yml"
  schedule:
    # Nightly drift check against lq-ai main HEAD (02:17 UTC).
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: canon-drift-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: resolve canon citations against lq-ai main
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify ci/ source and .github/workflows/ copy are in sync
        run: |
          set -euo pipefail
          if ! cmp -s ci/canon-drift-check.yml .github/workflows/canon-drift-check.yml; then
            echo "::error file=ci/canon-drift-check.yml::ci/canon-drift-check.yml and .github/workflows/canon-drift-check.yml differ — ci/ is the reviewed source of truth (§3.1); copy it over the .github/workflows/ twin in this PR."
            exit 1
          fi

      - name: Resolve lq-ai main HEAD
        id: canon
        run: |
          set -euo pipefail
          SHA="$(git ls-remote https://github.com/legalquants/lq-ai.git refs/heads/main | cut -f1)"
          if ! printf '%s' "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::could not resolve legalquants/lq-ai main HEAD"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Canon for this run: legalquants/lq-ai@${SHA} (main HEAD at run time)" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Shallow-fetch lq-ai at the resolved SHA
        run: |
          set -euo pipefail
          git init -q lq-ai-canon
          git -C lq-ai-canon remote add origin https://github.com/legalquants/lq-ai.git
          git -C lq-ai-canon fetch -q --depth 1 origin "${{ steps.canon.outputs.sha }}"
          git -C lq-ai-canon checkout -q FETCH_HEAD

      - name: Resolve every citation in rules/ and templates/
        run: bash ci/scripts/check-canon-drift.sh lq-ai-canon "${{ steps.canon.outputs.sha }}"
